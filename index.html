<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0" />
<title>thIAguinho • Logo Studio PRO</title>

<style>
:root{
  --bg:#0A2540;
  --accent:#00AEEF;
  --panel:#07182c;
  --panel2:#0d2746;
  --text:#e8f0ff;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Arial,Helvetica,sans-serif;
  background:var(--bg);
  color:var(--text);
}
header{
  padding:12px 16px;
  background:#020c1b;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
}
header .title{font-weight:bold}
header .actions button{margin-left:8px}

.container{
  display:flex;
  height:calc(100vh - 56px);
}

/* LEFT PANEL */
.controls{
  width:340px;
  background:var(--panel);
  padding:14px;
  overflow-y:auto;
  border-right:1px solid #0f3056;
}
.controls h3{
  margin:14px 0 6px;
  font-size:14px;
  opacity:.8;
}
.controls label{
  font-size:12px;
  opacity:.7;
}
.controls input,
.controls select,
.controls button{
  width:100%;
  margin-top:6px;
  margin-bottom:10px;
  padding:8px;
  border-radius:6px;
  border:none;
}
.controls input[type="color"]{padding:2px}
.controls button{
  background:var(--accent);
  color:#001018;
  cursor:pointer;
  font-weight:bold;
}
.controls button:hover{opacity:.85}

/* PREVIEW */
.preview{
  flex:1;
  display:flex;
  justify-content:center;
  align-items:center;
  position:relative;
}
.stage{
  position:relative;
  width:1080px;
  height:1080px;
  background:var(--bg);
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
}
.stage.gradient{
  background:linear-gradient(135deg,#0A2540,#00AEEF);
}
.stage.light{ background:#ffffff; }
.stage.transparent{ background:transparent; }

#logo{
  max-width:80%;
  transition:.2s;
  pointer-events:none;
}

/* helpers */
.grid{
  position:absolute;
  inset:0;
  background-image:linear-gradient(rgba(255,255,255,.06) 1px,transparent 1px),
                   linear-gradient(90deg,rgba(255,255,255,.06) 1px,transparent 1px);
  background-size:40px 40px;
  opacity:.3;
}
.safe{
  position:absolute;
  inset:80px;
  border:1px dashed rgba(255,255,255,.4);
  pointer-events:none;
}
.qr{
  position:absolute;
  bottom:20px;
  right:20px;
  width:120px;
  height:120px;
  background:#fff;
  display:none;
}
.qr img{width:100%}

/* buttons top */
.topbtn{
  background:var(--accent);
  border:none;
  padding:6px 10px;
  cursor:pointer;
  border-radius:6px;
  font-size:12px;
}

</style>
</head>

<body>

<header>
  <div class="title">thIAguinho • Logo Studio PRO</div>
  <div class="actions">
    <button class="topbtn" onclick="quickPreset('dark')">Dark</button>
    <button class="topbtn" onclick="quickPreset('light')">Light</button>
    <button class="topbtn" onclick="quickPreset('insta')">Instagram</button>
    <button class="topbtn" onclick="quickPreset('story')">Story</button>
  </div>
</header>

<div class="container">

<!-- CONTROLS -->
<div class="controls">

<h3>Fundo</h3>
<select id="bgMode" onchange="setBG()">
  <option value="dark">Escuro</option>
  <option value="light">Claro</option>
  <option value="gradient">Gradiente</option>
  <option value="transparent">Transparente</option>
</select>

<h3>Cor custom fundo</h3>
<input type="color" id="bgColor" value="#0A2540" onchange="customBG()">

<h3>Logo</h3>
<input type="file" accept="image/*" onchange="loadLogo(event)">

<label>Escala</label>
<input type="range" min="20" max="120" value="80" oninput="scaleLogo(this.value)">

<label>Rotação</label>
<input type="range" min="-20" max="20" value="0" oninput="rotateLogo(this.value)">

<label>Margem</label>
<input type="range" min="0" max="200" value="60" oninput="paddingLogo(this.value)">

<h3>Filtros</h3>

<label>Brilho</label>
<input type="range" min="50" max="200" value="100" oninput="filters()">

<label>Contraste</label>
<input type="range" min="50" max="200" value="100" oninput="filters()">

<label>Saturação</label>
<input type="range" min="0" max="200" value="100" oninput="filters()">

<label>Modo</label>
<select onchange="mode(this.value)">
  <option value="normal">Normal</option>
  <option value="invert">Invertido</option>
  <option value="mono">Mono</option>
</select>

<h3>Extras</h3>

<label>Mostrar grid</label>
<select onchange="toggleGrid(this.value)">
  <option value="off">Não</option>
  <option value="on">Sim</option>
</select>

<label>Safe area</label>
<select onchange="toggleSafe(this.value)">
  <option value="off">Não</option>
  <option value="on">Sim</option>
</select>

<label>QR Code (link)</label>
<input placeholder="https://..." onchange="makeQR(this.value)">

<h3>Exportação</h3>

<select id="format">
  <option value="square">Instagram 1080x1080</option>
  <option value="story">Story 1080x1920</option>
  <option value="wide">1920x1080</option>
  <option value="hd">2048x2048</option>
</select>

<button onclick="exportPNG()">Exportar PNG</button>

</div>

<!-- PREVIEW -->
<div class="preview">

<div class="stage" id="stage">
  <div class="grid" id="grid" style="display:none"></div>
  <div class="safe" id="safe" style="display:none"></div>
  <img src="assets/logo.png" id="logo">
  <div class="qr" id="qr"></div>
</div>

</div>

</div>

<script>

// BG
function setBG(){
  const v=document.getElementById('bgMode').value;
  const s=document.getElementById('stage');
  s.className='stage '+v;
}
function customBG(){
  document.getElementById('stage').style.background=document.getElementById('bgColor').value;
}

// LOGO
function loadLogo(e){
  const file=e.target.files[0];
  const url=URL.createObjectURL(file);
  document.getElementById('logo').src=url;
}

// SCALE / ROTATE
function scaleLogo(v){document.getElementById('logo').style.maxWidth=v+'%'}
function rotateLogo(v){document.getElementById('logo').style.transform='rotate('+v+'deg)'}
function paddingLogo(v){document.getElementById('stage').style.padding=v+'px'}

// FILTER
function filters(){
  const r=document.querySelectorAll('input[type=range]');
  const b=r[2].value;
  const c=r[3].value;
  const s=r[4].value;
  document.getElementById('logo').style.filter=
    `brightness(${b}%) contrast(${c}%) saturate(${s}%)`;
}

function mode(m){
  const l=document.getElementById('logo');
  if(m==='invert') l.style.filter='invert(1)';
  else if(m==='mono') l.style.filter='grayscale(1) brightness(2)';
  else filters();
}

// GRID / SAFE
function toggleGrid(v){document.getElementById('grid').style.display=v==='on'?'block':'none'}
function toggleSafe(v){document.getElementById('safe').style.display=v==='on'?'block':'none'}

// QR
function makeQR(link){
  if(!link)return;
  const qr=document.getElementById('qr');
  qr.style.display='block';
  qr.innerHTML='<img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data='+encodeURIComponent(link)+'">';
}

// PRESETS
function quickPreset(type){
  const s=document.getElementById('stage');
  if(type==='dark'){s.className='stage dark';}
  if(type==='light'){s.className='stage light';}
  if(type==='insta'){s.style.width='1080px';s.style.height='1080px';}
  if(type==='story'){s.style.width='1080px';s.style.height='1920px';}
}

// EXPORT
function exportPNG(){
  const f=document.getElementById('format').value;

  let w=1080,h=1080;
  if(f==='story'){w=1080;h=1920}
  if(f==='wide'){w=1920;h=1080}
  if(f==='hd'){w=2048;h=2048}

  const canvas=document.createElement('canvas');
  canvas.width=w;canvas.height=h;
  const ctx=canvas.getContext('2d');

  const bg=getComputedStyle(document.getElementById('stage')).backgroundColor;
  if(bg!=='rgba(0, 0, 0, 0)'){ctx.fillStyle=bg;ctx.fillRect(0,0,w,h)}

  const img=new Image();
  img.crossOrigin='anonymous';
  img.src=document.getElementById('logo').src;

  img.onload=()=>{
    let scale=.6;
    let lw=w*scale;
    let lh=(img.height/img.width)*lw;
    ctx.drawImage(img,(w-lw)/2,(h-lh)/2,lw,lh);

    const link=document.createElement('a');
    link.download='thiaguinho-logo.png';
    link.href=canvas.toDataURL();
    link.click();
  }
}

</script>

</body>
</html>
