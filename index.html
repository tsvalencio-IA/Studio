<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>thIAguinho Studio PRO</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0A2540;
  color:#fff;
}

header{
  text-align:center;
  padding:10px;
  background:#020c1b;
}

.container{
  display:flex;
  flex-direction:column;
}

.preview{
  height:50vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.stage{
  width:95%;
  height:95%;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#0A2540;
  position:relative;
}

.stage.light{background:#fff}
.stage.gradient{background:linear-gradient(135deg,#0A2540,#00AEEF)}

#logo{
  max-width:80%;
  transition:0.2s;
}

.controls{
  padding:12px;
  background:#081c34;
}

input,select,button{
  width:100%;
  padding:12px;
  margin-top:6px;
  margin-bottom:10px;
  border:none;
  border-radius:8px;
}

button{
  background:#00AEEF;
  color:#fff;
  font-weight:bold;
}

</style>
</head>

<body>

<header>thIAguinho Studio PRO</header>

<div class="container">

<div class="preview">
  <div class="stage" id="stage">
    <img src="assets/logo.png" id="logo">
    <img id="qrImg" style="position:absolute;bottom:10px;right:10px;width:80px;display:none;">
  </div>
</div>

<div class="controls">

<label>Upload Logo</label>
<input type="file" accept="image/*" onchange="loadLogo(event)">

<label>Fundo</label>
<select onchange="setBG(this.value)">
<option value="dark">Escuro</option>
<option value="light">Claro</option>
<option value="gradient">Gradiente</option>
</select>

<label>Escala</label>
<input type="range" min="20" max="120" value="80" oninput="state.scale=this.value;render()">

<label>Rotação</label>
<input type="range" min="-30" max="30" value="0" oninput="state.rotate=this.value;render()">

<label>Brilho</label>
<input type="range" min="50" max="200" value="100" oninput="state.brightness=this.value;render()">

<label>Contraste</label>
<input type="range" min="50" max="200" value="100" oninput="state.contrast=this.value;render()">

<label>Saturação</label>
<input type="range" min="0" max="200" value="100" oninput="state.saturate=this.value;render()">

<label>Modo</label>
<select onchange="state.mode=this.value;render()">
<option value="normal">Normal</option>
<option value="invert">Invertido</option>
<option value="mono">Mono</option>
</select>

<label>QR Link</label>
<input placeholder="https://..." onchange="setQR(this.value)">

<label>Formato</label>
<select id="format">
<option value="square">1080x1080</option>
<option value="story">1080x1920</option>
<option value="wide">1920x1080</option>
<option value="hd">2048x2048</option>
</select>

<button onclick="exportPNG()">EXPORTAR PROFISSIONAL</button>

</div>

</div>

<script>

let state={
  scale:80,
  rotate:0,
  brightness:100,
  contrast:100,
  saturate:100,
  mode:"normal",
  bg:"#0A2540",
  gradient:false,
  logoSrc:"assets/logo.png",
  qr:null
}

function loadLogo(e){
  let file=e.target.files[0]
  state.logoSrc=URL.createObjectURL(file)
  document.getElementById("logo").src=state.logoSrc
}

function setBG(v){
  let s=document.getElementById("stage")
  s.className="stage"
  state.gradient=false

  if(v==="light"){s.classList.add("light");state.bg="#ffffff"}
  if(v==="gradient"){s.classList.add("gradient");state.gradient=true}
  if(v==="dark"){state.bg="#0A2540"}
}

function setQR(link){
  if(!link)return
  state.qr="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data="+encodeURIComponent(link)
  document.getElementById("qrImg").src=state.qr
  document.getElementById("qrImg").style.display="block"
}

function render(){
  let logo=document.getElementById("logo")

  let filter=`brightness(${state.brightness}%) contrast(${state.contrast}%) saturate(${state.saturate}%)`

  if(state.mode==="invert") filter+=" invert(1)"
  if(state.mode==="mono") filter+=" grayscale(1)"

  logo.style.filter=filter
  logo.style.maxWidth=state.scale+"%"
  logo.style.transform=`rotate(${state.rotate}deg)`
}

function exportPNG(){

  let format=document.getElementById("format").value

  let w=1080,h=1080
  if(format==="story"){w=1080;h=1920}
  if(format==="wide"){w=1920;h=1080}
  if(format==="hd"){w=2048;h=2048}

  let canvas=document.createElement("canvas")
  canvas.width=w
  canvas.height=h
  let ctx=canvas.getContext("2d")

  if(state.gradient){
    let g=ctx.createLinearGradient(0,0,w,h)
    g.addColorStop(0,"#0A2540")
    g.addColorStop(1,"#00AEEF")
    ctx.fillStyle=g
  } else {
    ctx.fillStyle=state.bg
  }

  ctx.fillRect(0,0,w,h)

  let img=new Image()
  img.src=state.logoSrc

  img.onload=()=>{

    ctx.filter=`brightness(${state.brightness}%) contrast(${state.contrast}%) saturate(${state.saturate}%)`

    if(state.mode==="invert") ctx.filter+=" invert(1)"
    if(state.mode==="mono") ctx.filter+=" grayscale(1)"

    let scale=state.scale/100
    let lw=w*scale
    let lh=(img.height/img.width)*lw

    ctx.save()
    ctx.translate(w/2,h/2)
    ctx.rotate(state.rotate*Math.PI/180)
    ctx.drawImage(img,-lw/2,-lh/2,lw,lh)
    ctx.restore()

    if(state.qr){
      let qr=new Image()
      qr.src=state.qr
      qr.onload=()=>{
        ctx.drawImage(qr,w-150,h-150,120,120)
        finish()
      }
    } else {
      finish()
    }

    function finish(){
      let link=document.createElement("a")
      link.download="thiaguinho-logo.png"
      link.href=canvas.toDataURL("image/png")
      link.click()
    }
  }
}

render()

</script>

</body>
</html>
