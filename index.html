<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>thIAguinho Studio PRO</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0A2540;
  color:#fff;
}

header{
  text-align:center;
  padding:10px;
  background:#020c1b;
}

.container{
  display:flex;
  flex-direction:column;
}

.preview{
  height:50vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.stage{
  width:95%;
  height:95%;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#0A2540;
  position:relative;
  overflow:hidden;
}

.stage.light{background:#fff}
.stage.gradient{background:linear-gradient(135deg,#0A2540,#00AEEF)}

.logoWrap{
  position:relative;
  display:flex;
  justify-content:center;
  align-items:center;
  width:100%;
  height:100%;
}

#logoBase, #logoOverlay{
  max-width:80%;
  position:absolute;
  display:block;
}

#logoOverlay{
  pointer-events:none;
  mix-blend-mode:screen;
  filter:saturate(3) contrast(1.2);
  opacity:0;
}

.controls{
  padding:12px;
  background:#081c34;
}

input,select,button{
  width:100%;
  padding:12px;
  margin-top:6px;
  margin-bottom:10px;
  border:none;
  border-radius:8px;
}

button{
  background:#00AEEF;
  color:#fff;
  font-weight:bold;
}

#qrImg{
  position:absolute;
  bottom:10px;
  right:10px;
  width:80px;
  display:none;
}
</style>
</head>

<body>

<header>thIAguinho Studio PRO</header>

<div class="container">

<div class="preview">
  <div class="stage" id="stage">

    <div class="logoWrap">
      <img src="assets/logo.png" id="logoBase">
      <img src="assets/logo.png" id="logoOverlay">
    </div>

    <img id="qrImg">

  </div>
</div>

<div class="controls">

<label>Upload Logo</label>
<input type="file" accept="image/*" onchange="loadLogo(event)">

<label>Fundo</label>
<select onchange="setBG(this.value)">
<option value="dark">Escuro</option>
<option value="light">Claro</option>
<option value="gradient">Gradiente</option>
</select>

<label>Escala</label>
<input type="range" min="20" max="120" value="80" oninput="update('scale',this.value)">

<label>Rotação</label>
<input type="range" min="-30" max="30" value="0" oninput="update('rotate',this.value)">

<label>Brilho</label>
<input type="range" min="50" max="200" value="100" oninput="update('brightness',this.value)">

<label>Contraste</label>
<input type="range" min="50" max="200" value="100" oninput="update('contrast',this.value)">

<label>Saturação</label>
<input type="range" min="0" max="200" value="100" oninput="update('saturate',this.value)">

<label>Modo</label>
<select onchange="update('mode',this.value)">
<option value="normal">Normal</option>
<option value="invert">Invertido (preserva IA)</option>
<option value="mono">Mono</option>
</select>

<label>QR Link</label>
<input placeholder="https://..." onchange="setQR(this.value)">

<label>Formato</label>
<select id="format">
<option value="square">1080x1080</option>
<option value="story">1080x1920</option>
<option value="wide">1920x1080</option>
<option value="hd">2048x2048</option>
</select>

<button onclick="exportPNG()">EXPORTAR PROFISSIONAL</button>

</div>

</div>

<script>

let state={
  scale:80,
  rotate:0,
  brightness:100,
  contrast:100,
  saturate:100,
  mode:"normal",
  bg:"#0A2540",
  gradient:false,
  logoSrc:"assets/logo.png",
  qr:null
}

function loadLogo(e){
  let file=e.target.files[0]
  if(!file)return
  let url=URL.createObjectURL(file)
  state.logoSrc=url
  document.getElementById("logoBase").src=url
  document.getElementById("logoOverlay").src=url
}

function setBG(v){
  let s=document.getElementById("stage")
  s.className="stage"
  state.gradient=false

  if(v==="light"){s.classList.add("light");state.bg="#ffffff"}
  if(v==="gradient"){s.classList.add("gradient");state.gradient=true}
  if(v==="dark"){state.bg="#0A2540"}
}

function setQR(link){
  if(!link)return
  state.qr="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data="+encodeURIComponent(link)
  let q=document.getElementById("qrImg")
  q.src=state.qr
  q.style.display="block"
}

function update(key,value){
  state[key]=value
  render()
}

function render(){

  let base=document.getElementById("logoBase")
  let overlay=document.getElementById("logoOverlay")

  let filter=`brightness(${state.brightness}%) contrast(${state.contrast}%) saturate(${state.saturate}%)`

  if(state.mode==="invert"){
    base.style.filter=filter+" invert(1)"
    overlay.style.opacity=1
  }
  else if(state.mode==="mono"){
    base.style.filter="grayscale(1) brightness(2)"
    overlay.style.opacity=0
  }
  else{
    base.style.filter=filter
    overlay.style.opacity=0
  }

  base.style.maxWidth=state.scale+"%"
  overlay.style.maxWidth=state.scale+"%"

  base.style.transform=`rotate(${state.rotate}deg)`
  overlay.style.transform=`rotate(${state.rotate}deg)`
}

function exportPNG(){

  let format=document.getElementById("format").value

  let w=1080,h=1080
  if(format==="story"){w=1080;h=1920}
  if(format==="wide"){w=1920;h=1080}
  if(format==="hd"){w=2048;h=2048}

  let canvas=document.createElement("canvas")
  canvas.width=w
  canvas.height=h
  let ctx=canvas.getContext("2d")

  if(state.gradient){
    let g=ctx.createLinearGradient(0,0,w,h)
    g.addColorStop(0,"#0A2540")
    g.addColorStop(1,"#00AEEF")
    ctx.fillStyle=g
  } else {
    ctx.fillStyle=state.bg
  }

  ctx.fillRect(0,0,w,h)

  let img=new Image()
  img.src=state.logoSrc

  img.onload=()=>{

    let filter=`brightness(${state.brightness}%) contrast(${state.contrast}%) saturate(${state.saturate}%)`
    if(state.mode==="invert") filter+=" invert(1)"
    if(state.mode==="mono") filter="grayscale(1) brightness(2)"

    ctx.filter=filter

    let scale=state.scale/100
    let lw=w*scale
    let lh=(img.height/img.width)*lw

    ctx.save()
    ctx.translate(w/2,h/2)
    ctx.rotate(state.rotate*Math.PI/180)
    ctx.drawImage(img,-lw/2,-lh/2,lw,lh)
    ctx.restore()

    if(state.mode==="invert"){
      ctx.filter="none"
      ctx.globalCompositeOperation="screen"
      ctx.drawImage(img,(w-lw)/2,(h-lh)/2,lw,lh)
      ctx.globalCompositeOperation="source-over"
    }

    if(state.qr){
      let qr=new Image()
      qr.src=state.qr
      qr.onload=()=>{
        ctx.drawImage(qr,w-150,h-150,120,120)
        finish()
      }
    } else {
      finish()
    }

    function finish(){
      let link=document.createElement("a")
      link.download="thiaguinho-logo.png"
      link.href=canvas.toDataURL("image/png")
      link.click()
    }
  }
}

render()

</script>

</body>
</html>
